# NexTwin MVP — 地震救援 · 纸箱压机器人 · 搬离障碍
# 用户指令：识别场景，搬离长方体障碍物，解救被困 Mini Pi

scene: earthquake_box_rescue
scenario: obstacle
target: obstacle_box

instruction: >
  地震救援现场：纸箱子压着被困机器人，请识别场景并搬离前方长方体障碍物，解救受困目标。

objects:
  - id: unitree
    label: 宇树 G1 机器人
    type: robot
    position: [0, 0, 0]
  - id: obstacle_box
    label: 纸箱长方体障碍物
    type: obstacle
    position: [-2.0, 0.35, -1.5]
    metadata:
      shape: box
      size: [0.7, 0.45, 0.55]
      mass_kg: 8.0
      material: cardboard
  - id: mini_pi
    label: Mini Pi (被压)
    type: victim
    position: [-2.0, 0.1, -1.5]
    metadata:
      trapped_by: obstacle_box
  - id: path_zone
    label: 废墟通道
    type: zone
    position: [-1.0, 0, -0.8]

waypoints:
  home: [0.0, 0.0, 0.0]
  approach: [-1.2, 0.0, -1.0]
  push_point: [-1.8, 0.0, -1.4]
  clear_zone: [0.5, 0.0, 0.5]

yolo:
  target_class: obstacle_box
  secondary_class: mini_pi
  coco_demo_aliases:
    suitcase: obstacle_box
    book: obstacle_box
    cell phone: mini_pi

rule_engine:
  sequence:
    - yolo_detect_box_and_victim
    - turn_toward_target
    - forward_to_box
    - stop
    - push_box_away
    - verify_victim_free

physics:
  push_distance_m: 1.2
  friction: 0.55
